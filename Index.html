<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monito</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet" />
    
  </head>
  <body>
    <section class="section-1">
      <header>
        <div class="menu-bar">
          <img src="assets/Ecommece/hamburger.png" alt="menu" />
        </div>
        <div class="monito-logo">
          <img src="assets/Ecommece/Frame.svg" alt="logo" />
        </div>
        <ul>
          <li>Home</li>
          <li>Category</li>
          <li>About</li>
          <li>Contact</li>
        </ul>
        <div class="search-icon">
          <img
            src="assets/Ecommece/search-interface-symbol (1).png"
            alt="search"
          />
        </div>
        <div class="search-container-section">
          <div class="search-container">
            <img
              src="assets/Ecommece/search-interface-symbol (1).png"
              alt="search"
            />
            <input type="search" placeholder="Search something Here..." />
          </div>
        </div>
        <div class="join-community-btn">
          <button type="button">Join the community</button>
        </div>
        <div class="vnd-section">
          <div class="vnd-star">
            <span>
              <img src="assets/Ecommece/Vector.png" />
            </span>
          </div>
          <div class="vnd-arrow">
            <span class="vnd-text"> VND </span>
            <select name="" id="">
            </select>
          </div>
        </div>
      </header>
      <span class="shape-1"></span>
      <div class="hero-shapes">
      <span class="shape-2"></span>
      <span class="shape-3"></span>
      </div>
      <span class="shape-4"></span>
      <span class="shape-5"></span>
      <span class="shape-6"></span>
      <span class="shape-7"></span>
      <span class="shape-8"></span>
      <span class="shape-9"></span>
      <span class="shape-10"></span>
      <div class="hero-section-1">
        <div class="hero-container-1">
          <div class="hero-content">
            <h2>One More Friend</h2>
            <h3>Thousands More Fun!</h3>
            <p>Having a pet means you have more joy, a new friend, a happy person who will always be with you to have fun. We have 200+ different pets that can meet your needs!</p>
          </div>
          <div class="hero-button">
            <button type="button" id="view-intro-button">View Intro <img src="assets/Ecommece/play-button.png"></button>
            <button type="button" id="explore-now-button"> Explore Now</button>
          </div>
        </div>
        <div class="hero-image">
          <img src="assets/Hero-image-1-bog-with-gril (2).png" alt="hero-image">
        </div>
      </div>
    </section>
    <section class="section-2"></section>
    <section class="section-3"></section>
    <section class="section-4"></section>
    <section class="section-5"></section>
    <section class="section-6"></section>
    <footer>footer</footer>
  </body>
</html>
